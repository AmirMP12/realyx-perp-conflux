# Prometheus config for docker-compose (minimal - no K8s, no exporters)
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Backend Prometheus metrics (dedicated metrics server on METRICS_PORT 9090
  # inside the container). The API service exposes it on the container network.
  - job_name: backend
    static_configs:
      - targets: ["backend:9090"]

  # Indexer worker metrics (same METRICS_PORT). Emits indexer lag / reorg and
  # reconciliation drift series consumed by the alert rules.
  - job_name: indexer
    static_configs:
      - targets: ["indexer:9090"]
