specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: TradingCore
    network: conflux-espace
    source:
      address: "0xDDe4D077C617C1B84dA369fB8fD391BE6530C40E"
      abi: TradingCore
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Protocol
        - Market
        - User
        - Position
        - PositionModification
        - Trade
        - Order
        - FundingSnapshot
        - ProtocolMetric
      abis:
        - name: TradingCore
          file: ./abis/TradingCore.json
      eventHandlers:
        - event: PositionOpened(indexed uint256,indexed address,indexed address,bool,uint256,uint256,uint256)
          handler: handlePositionOpened
        - event: PositionClosed(indexed uint256,indexed address,int256,uint256,uint256)
          handler: handlePositionClosed
        - event: PositionLiquidated(indexed uint256,indexed address,uint256,uint256)
          handler: handlePositionLiquidated
        - event: PositionModified(indexed uint256,uint256,uint256,uint256,uint256)
          handler: handlePositionModified
        - event: FundingSettled(indexed address,int256,int256,uint256)
          handler: handleFundingSettled
        - event: OrderCreated(indexed uint256,indexed address,uint8,address)
          handler: handleOrderCreated
        - event: OrderExecuted(indexed uint256,uint256,indexed address)
          handler: handleOrderExecuted
        - event: OrderCancelled(indexed uint256,string)
          handler: handleOrderCancelled
        - event: MarketUpdated(indexed address,uint256,uint256,uint256)
          handler: handleMarketUpdated
      file: ./src/trading-core.ts

  - kind: ethereum
    name: VaultCore
    network: conflux-espace
    source:
      address: "0xd74f9539847E8f5b63cd8F09547c9497FbbB83Ee"
      abi: VaultCore
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - VaultDeposit
        - WithdrawalRequest
        - InsuranceStake
        - BadDebtClaim
        - Protocol
      abis:
        - name: VaultCore
          file: ./abis/VaultCore.json
      eventHandlers:
        - event: Deposit(indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: WithdrawalQueued(indexed address,uint256,uint256)
          handler: handleWithdrawalQueued
        - event: WithdrawalProcessed(indexed uint256,indexed address,uint256)
          handler: handleWithdrawalProcessed
        - event: ExposureUpdated(indexed address,uint256,uint256)
          handler: handleExposureUpdated
        - event: InsuranceStaked(indexed address,uint256,uint256)
          handler: handleInsuranceStaked
        - event: InsuranceUnstaked(indexed address,uint256,uint256)
          handler: handleInsuranceUnstaked
        - event: BadDebtCovered(indexed uint256,uint256,uint256)
          handler: handleBadDebtCovered
        - event: ClaimSubmitted(indexed uint256,uint256,uint256)
          handler: handleClaimSubmitted
      file: ./src/vault-core.ts

  - kind: ethereum
    name: OracleAggregator
    network: conflux-espace
    source:
      address: "0x8190715C58f4d1be1a1EF8FdA44133B77972e9e1"
      abi: OracleAggregator
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - PriceSnapshot
        - BreakerEvent
      abis:
        - name: OracleAggregator
          file: ./abis/OracleAggregator.json
      eventHandlers:
        - event: PriceUpdated(indexed address,uint256,uint256,uint256)
          handler: handlePriceUpdated
        - event: BreakerTriggered(indexed address,uint8,uint256,uint256)
          handler: handleBreakerTriggered
        - event: BreakerReset(indexed address,uint8,address)
          handler: handleBreakerReset
      file: ./src/oracle-aggregator.ts

  - kind: ethereum
    name: PositionToken
    network: conflux-espace
    source:
      address: "0xb812dE8a28614f52fF9ace0688bCF147fF5d824d"
      abi: PositionToken
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PositionTokenEvent
        - Market
      abis:
        - name: PositionToken
          file: ./abis/PositionToken.json
      eventHandlers:
        - event: PositionTokenMinted(indexed address,indexed uint256,indexed address,bool)
          handler: handlePositionTokenMinted
        - event: PositionTokenBurned(indexed uint256)
          handler: handlePositionTokenBurned
      file: ./src/position-token.ts

  - kind: ethereum
    name: DividendManager
    network: conflux-espace
    source:
      address: "0x44a24C5a9ab2cBF7B2cc5A1bF4eAD17C62356bCB"
      abi: DividendManager
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - DividendDistribution
      abis:
        - name: DividendManager
          file: ./abis/DividendManager.json
      eventHandlers:
        - event: DividendDistributed(indexed string,uint256,uint256,uint256)
          handler: handleDividendDistributed
      file: ./src/dividend-manager.ts
