type Protocol @entity {
  id: ID!
  tradingCore: Bytes!
  vaultCore: Bytes!
  oracleAggregator: Bytes!
  positionToken: Bytes!
  chainId: Int!
  totalPositionsOpened: BigInt!
  totalPositionsClosed: BigInt!
  totalTrades: BigInt!
  totalVolumeUsd: BigInt!
  totalFeesUsd: BigInt!
  totalLiquidations: BigInt!
  tvl: BigInt!
  tvlUpdatedAt: BigInt!
}

type Market @entity {
  id: ID!
  marketAddress: Bytes!
  marketId: String
  maxLeverage: BigInt!
  maxPositionSize: BigInt!
  maxTotalExposure: BigInt!
  totalLongSize: BigInt!
  totalShortSize: BigInt!
  totalLongCost: BigInt!
  totalShortCost: BigInt!
  isActive: Boolean!
  isListed: Boolean!
  fundingRate: BigInt!
  cumulativeFunding: BigInt!
  lastFundingTime: BigInt!
  longOpenInterest: BigInt!
  shortOpenInterest: BigInt!
  createdAt: BigInt!
  updatedAt: BigInt!
  positions: [Position!]! @derivedFrom(field: "market")
  fundingSnapshots: [FundingSnapshot!]! @derivedFrom(field: "market")
  priceSnapshots: [PriceSnapshot!]! @derivedFrom(field: "market")
}

type User @entity {
  id: ID!
  address: Bytes!
  totalPositions: Int!
  totalTrades: BigInt!
  totalVolumeUsd: BigInt!
  totalRealizedPnl: BigInt!
  " Relations "
  positions: [Position!]! @derivedFrom(field: "trader")
  trades: [Trade!]! @derivedFrom(field: "trader")
  orders: [Order!]! @derivedFrom(field: "account")
  deposits: [VaultDeposit!]! @derivedFrom(field: "user")
  withdrawals: [WithdrawalRequest!]! @derivedFrom(field: "user")
  insuranceStakes: [InsuranceStake!]! @derivedFrom(field: "user")
  firstSeenAt: BigInt!
  lastSeenAt: BigInt!
}

type Position @entity {
  id: ID!
  positionId: BigInt!
  tokenId: BigInt!
  trader: User!
  market: Market!
  isLong: Boolean!
  size: BigInt!
  entryPrice: BigInt!
  liquidationPrice: BigInt!
  stopLossPrice: BigInt!
  takeProfitPrice: BigInt!
  leverage: BigInt!
  collateralAmount: BigInt!
  state: String!
  openTimestamp: BigInt!
  closeTimestamp: BigInt
  lastFundingTime: BigInt!
  modifications: [PositionModification!]! @derivedFrom(field: "position")
  trades: [Trade!]! @derivedFrom(field: "position")
  createdAt: BigInt!
  updatedAt: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type PositionModification @entity {
  id: ID!
  position: Position!
  newSize: BigInt!
  newLeverage: BigInt!
  newStopLoss: BigInt!
  newTakeProfit: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type Trade @entity {
  id: ID!
  position: Position!
  trader: User!
  market: Market!
  type: String!
  isLong: Boolean!
  size: BigInt!
  price: BigInt!
  realizedPnl: BigInt!
  fee: BigInt!
  liquidator: Bytes
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type Order @entity {
  id: ID!
  orderId: BigInt!
  account: User!
  market: Market!
  orderType: String!
  sizeDelta: BigInt!
  triggerPrice: BigInt!
  positionId: BigInt!
  isLong: Boolean!
  timestamp: BigInt!
  executedAt: BigInt
  executedPositionId: BigInt
  keeper: Bytes
  cancelled: Boolean!
  cancelReason: String
  blockNumber: BigInt!
  txHash: Bytes!
}

type FundingSnapshot @entity {
  id: ID!
  market: Market!
  fundingRate: BigInt!
  cumulativeFunding: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type PriceSnapshot @entity {
  id: ID!
  market: Market!
  price: BigInt!
  confidence: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type BreakerEvent @entity {
  id: ID!
  market: Market!
  breakerType: Int!
  triggered: Boolean!
  threshold: BigInt
  actualValue: BigInt
  resetBy: Bytes
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type VaultDeposit @entity {
  id: ID!
  user: User!
  assets: BigInt!
  shares: BigInt!
  isDeposit: Boolean!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type WithdrawalRequest @entity {
  id: ID!
  requestId: BigInt!
  user: User!
  shares: BigInt!
  minAssets: BigInt!
  requestTime: BigInt!
  processed: Boolean!
  processedAt: BigInt
  assetsReceived: BigInt
  blockNumber: BigInt!
  txHash: Bytes!
}

type InsuranceStake @entity {
  id: ID!
  user: User!
  assets: BigInt!
  shares: BigInt!
  isStake: Boolean!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type BadDebtClaim @entity {
  id: ID!
  claimId: BigInt!
  positionId: BigInt!
  amount: BigInt!
  submittedAt: BigInt!
  coveredAt: BigInt
  blockNumber: BigInt!
  txHash: Bytes!
}

type DividendDistribution @entity {
  id: ID!
  marketId: String!
  amountPerShare: BigInt!
  newIndex: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type PositionTokenEvent @entity {
  id: ID!
  tokenId: BigInt!
  to: Bytes!
  market: Market
  isLong: Boolean!
  minted: Boolean!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
}

type ProtocolMetric @entity {
  id: ID!
  period: BigInt!
  periodType: String!
  volumeUsd: BigInt!
  tradesCount: BigInt!
  feesUsd: BigInt!
  liquidationsCount: BigInt!
  openInterestLong: BigInt!
  openInterestShort: BigInt!
  tvl: BigInt!
  timestamp: BigInt!
}
