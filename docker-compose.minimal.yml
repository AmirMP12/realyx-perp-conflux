# Minimal Docker Compose - backend + frontend only
# Run: docker-compose -f docker-compose.minimal.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realyx-backend
    environment:
      PORT: 3001
      WS_PORT: 3002
      NODE_ENV: production
      POSTGRES_URL: ${POSTGRES_URL:-postgres://realyx:realyx_secret@postgres:5432/realyx}
      CHAIN_ID: ${CHAIN_ID:-71}
      RPC_URL: ${RPC_URL:-https://evmtestnet.confluxrpc.com}
      TRADING_CORE_ADDRESS: ${TRADING_CORE_ADDRESS:-0x49493c04Df243FDD73a26E0AB10d9Fd89d82a92e}
      ORACLE_AGGREGATOR_ADDRESS: ${ORACLE_AGGREGATOR_ADDRESS:-0xBb9B26F89624a505Fc4318463CC5a7325E5A106E}
    ports:
      - "3011:3001"
      - "3012:3002"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3000/ws}
        VITE_NETWORK: ${NETWORK:-confluxTestnet}
        VITE_WALLET_CONNECT_PROJECT_ID: ${VITE_WALLET_CONNECT_PROJECT_ID:-}
        VITE_TRADING_LIB_ADDRESS: ${VITE_TRADING_LIB_ADDRESS:-0x5AEA00500f4b7519DeA151bC1590496ABAAb4B15}
        VITE_POSITION_TOKEN_ADDRESS: ${VITE_POSITION_TOKEN_ADDRESS:-0x0e7110ED111add8Ac5EB148567f4504569aC749f}
        VITE_ORACLE_AGGREGATOR_ADDRESS: ${VITE_ORACLE_AGGREGATOR_ADDRESS:-0xBb9B26F89624a505Fc4318463CC5a7325E5A106E}
        VITE_VAULT_CORE_ADDRESS: ${VITE_VAULT_CORE_ADDRESS:-0xe934aB1736a7924c1B9A290d57a73a0340092e24}
        VITE_TRADING_CORE_ADDRESS: ${VITE_TRADING_CORE_ADDRESS:-0x49493c04Df243FDD73a26E0AB10d9Fd89d82a92e}
    ports:
      - "3010:80"
    depends_on:
      - backend
    restart: unless-stopped
