name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20'

jobs:
  # Smart Contracts
  build-contracts:
    name: Build & Test Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Run tests
        run: npx hardhat test

      - name: Check formatting
        run: |
          npm run lint:fix
          if [ -n "$(git status --porcelain -- contracts/ scripts/)" ]; then
            echo "::error::Code style issues found. Run 'npm run lint:fix' locally and commit."
            git diff --stat
            exit 1
          fi

  # Backend
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        continue-on-error: true

  # Frontend
  build-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build



  # Docker Images
  build-images:
    name: Build Docker Images
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: ./backend
            image: backend
          - context: ./frontend
            image: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Deploy Contracts to Conflux eSpace Testnet
  deploy-testnet:
    name: Deploy to Conflux Testnet
    needs: [build-contracts, build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Deploy Contracts to Conflux eSpace Testnet
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          CONFLUX_TESTNET_RPC_URL: ${{ secrets.CONFLUX_TESTNET_RPC_URL }}
          TREASURY_ADDRESS: ${{ secrets.TREASURY_ADDRESS }}
          GAS_PRICE_GWEI: ${{ secrets.GAS_PRICE_GWEI }}
        run: |
          npx hardhat run scripts/deploy-testnet.ts --network confluxTestnet

      - name: Verify Contracts on ConfluxScan
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          CONFLUX_TESTNET_RPC_URL: ${{ secrets.CONFLUX_TESTNET_RPC_URL }}
          CONFLUXSCAN_API_KEY: ${{ secrets.CONFLUXSCAN_API_KEY }}
        run: |
          npx hardhat run scripts/verify.ts --network confluxTestnet
        continue-on-error: true

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-confluxTestnet
          path: deployment/confluxTestnet.json

      - name: Deploy Kubernetes
        if: ${{ vars.ENABLE_K8S_DEPLOY == 'true' }}
        uses: azure/k8s-deploy@v4
        with:
          namespace: realyx-staging
          manifests: |
            infrastructure/kubernetes/namespace.yaml
            infrastructure/kubernetes/configmap.yaml
            infrastructure/kubernetes/backend.yaml
            infrastructure/kubernetes/frontend.yaml

  # Deploy Contracts to Conflux eSpace Mainnet
  deploy-mainnet:
    name: Deploy to Conflux Mainnet
    needs: [build-contracts]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: mainnet
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Deploy Contracts to Conflux eSpace Mainnet
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          CONFLUX_RPC_URL: ${{ secrets.CONFLUX_RPC_URL }}
          TREASURY_ADDRESS: ${{ secrets.TREASURY_ADDRESS }}
          SKIP_CONFIRMATIONS: 'true'
          GAS_PRICE_GWEI: ${{ secrets.GAS_PRICE_GWEI }}
        run: |
          npx hardhat run scripts/deploy-mainnet.ts --network conflux

      - name: Verify Contracts on ConfluxScan
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          CONFLUX_RPC_URL: ${{ secrets.CONFLUX_RPC_URL }}
          CONFLUXSCAN_API_KEY: ${{ secrets.CONFLUXSCAN_API_KEY }}
        run: |
          npx hardhat run scripts/verify.ts --network conflux
        continue-on-error: true

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-conflux
          path: deployment/conflux.json
